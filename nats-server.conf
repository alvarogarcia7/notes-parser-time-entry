# NATS Server Configuration with Mutual TLS

listen: 0.0.0.0:4222
http:   0.0.0.0:8222

# Mutual TLS (mTLS) Configuration
# Clients must present a certificate signed by the CA
# The certificate CN is mapped to a NATS user for authorization
tls {
  cert_file: "/certs/server.pem"
  key_file:  "/certs/server.key"
  ca_file:   "/certs/rootCA.pem"
  verify_and_map: true
}

# Authorization based on certificate CN
# The verify_and_map setting extracts the CN from the client cert
# and matches it against the user list here
authorization {
  users = [
    { user: "pipeline-client" }
  ]
}
